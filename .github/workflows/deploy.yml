name: Deploy

on:
  # Manual-only by default. Once you've configured CLOUDFLARE_API_TOKEN and
  # CLOUDFLARE_ACCOUNT_ID secrets and confirmed deploys work, uncomment the
  # `push` trigger below to enable automatic deploys on merge to main.
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run --filter @bainder/api deploy
