name: Publish SDK

on:
  # Manual-only by default. Once you've configured the NPM_TOKEN secret and
  # confirmed publishes work (and the SDK has a real version > 0.0.1),
  # uncomment the `push` trigger below to enable automatic publishes on
  # merge to main.
  # push:
  #   branches: [main]
  #   paths:
  #     - "packages/sdk/**"
  #     - ".github/workflows/publish-sdk.yml"
  workflow_dispatch:

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile SDK
        run: bun run --filter '*/sdk' compile

      - name: Check if version needs publishing
        id: check
        working-directory: packages/sdk
        run: |
          NAME=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view "$NAME" version 2>/dev/null || echo "none")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping publish — $NAME@$LOCAL already on npm"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Publishing $NAME@$LOCAL (npm has $REMOTE)"
          fi

      - name: Prepare package.json for publish
        if: steps.check.outputs.publish == 'true'
        run: bun run --filter '*/sdk' prepare-publish

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --ignore-scripts
